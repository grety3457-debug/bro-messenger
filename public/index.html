<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bro Messenger</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #252946, #0b0c12);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: min(700px, 100%);
            height: 85vh;
            background: rgba(20, 22, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .top {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

            .top h1 {
                font-size: 22px;
                margin-bottom: 4px;
            }

            .top p {
                color: #a1a1aa;
                font-size: 14px;
            }

        .login {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

            .login input,
            .form input {
                flex: 1;
                border: 0;
                outline: 0;
                border-radius: 14px;
                padding: 14px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                font-size: 15px;
            }

            .login button,
            .form button {
                border: 0;
                border-radius: 14px;
                padding: 14px 18px;
                background: linear-gradient(135deg, #6c5ce7, #00cec9);
                color: white;
                font-weight: bold;
                cursor: pointer;
            }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.1);
            line-height: 1.35;
            word-wrap: break-word;
        }

            .message.me {
                align-self: flex-end;
                background: linear-gradient(135deg, #6c5ce7, #0984e3);
                border-bottom-right-radius: 5px;
            }

            .message.other {
                align-self: flex-start;
                border-bottom-left-radius: 5px;
            }

            .message b {
                display: block;
                margin-bottom: 5px;
                font-size: 13px;
                color: #d4d4d8;
            }

            .message small {
                display: block;
                margin-top: 6px;
                opacity: 0.65;
                text-align: right;
                font-size: 11px;
            }

        .typing {
            height: 24px;
            padding: 0 20px;
            color: #a1a1aa;
            font-size: 14px;
        }

        .form {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="top">
            <h1>Bro Messenger</h1>
            <p id="status">Введи имя, чтобы зайти в чат</p>
        </div>

        <div class="login" id="loginBox">
            <input id="nameInput" placeholder="Твоё имя..." />
            <button id="loginBtn">Войти</button>
        </div>

        <div class="messages" id="messages"></div>

        <div class="typing" id="typing"></div>

        <form class="form hidden" id="form">
            <input id="messageInput" placeholder="Напиши сообщение..." autocomplete="off" />
            <button>Отправить</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
    const socket = io();

    let myName = "";

    const loginBox = document.getElementById("loginBox");
    const nameInput = document.getElementById("nameInput");
    const loginBtn = document.getElementById("loginBtn");
    const statusText = document.getElementById("status");
    const messages = document.getElementById("messages");
    const typing = document.getElementById("typing");
    const form = document.getElementById("form");
    const messageInput = document.getElementById("messageInput");

    loginBtn.addEventListener("click", login);

    nameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") login();
    });

    function login() {
      const name = nameInput.value.trim();

      if (!name) {
        alert("Введи имя, бро");
        return;
      }

      myName = name;
      loginBox.classList.add("hidden");
      form.classList.remove("hidden");
      statusText.textContent = `Ты вошёл как ${myName}`;
      messageInput.focus();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = messageInput.value.trim();

      if (!text) return;

      socket.emit("chat message", {
        name: myName,
        text: text
      });

      messageInput.value = "";
      typing.textContent = "";
    });

    messageInput.addEventListener("input", () => {
      if (myName) {
        socket.emit("typing", myName);
      }
    });

    socket.on("chat message", (data) => {
      const div = document.createElement("div");

      if (data.name === myName) {
        div.className = "message me";
      } else {
        div.className = "message other";
      }

      div.innerHTML = `
        <b>${escapeHTML(data.name)}</b>
        ${escapeHTML(data.text)}
        <small>${escapeHTML(data.time)}</small>
      `;

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      typing.textContent = "";
    });

    socket.on("typing", (name) => {
      if (name === myName) return;

      typing.textContent = `${name} печатает...`;

      setTimeout(() => {
        typing.textContent = "";
      }, 1200);
    });

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    </script>
</body>
</html>
