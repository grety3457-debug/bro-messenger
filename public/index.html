<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bro Messenger</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #252946, #0b0c12);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: min(900px, 100%);
            height: 85vh;
            background: rgba(20, 22, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        /* Сайдбар - список пользователей */
        .sidebar {
            width: 260px;
            background: rgba(15, 17, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

            .sidebar-header h2 {
                font-size: 18px;
            }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .user-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

            .user-item:hover {
                background: rgba(255,255,255,0.08);
            }

            .user-item.active {
                background: rgba(108, 92, 231, 0.3);
            }

            .user-item .status {
                width: 10px;
                height: 10px;
                background: #00b894;
                border-radius: 50%;
            }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header {
            font-size: 20px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.1);
            line-height: 1.35;
        }

            .message.me {
                align-self: flex-end;
                background: linear-gradient(135deg, #6c5ce7, #0984e3);
                border-bottom-right-radius: 5px;
            }

            .message.other {
                align-self: flex-start;
                border-bottom-left-radius: 5px;
            }

            .message b {
                display: block;
                margin-bottom: 5px;
                font-size: 13px;
                color: #d4d4d8;
            }

            .message small {
                display: block;
                margin-top: 6px;
                opacity: 0.65;
                text-align: right;
                font-size: 11px;
            }

        .form {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

            .form input {
                flex: 1;
                border: 0;
                outline: 0;
                border-radius: 14px;
                padding: 14px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                font-size: 15px;
            }

            .form button {
                border: 0;
                border-radius: 14px;
                padding: 14px 24px;
                background: linear-gradient(135deg, #6c5ce7, #00cec9);
                color: white;
                font-weight: bold;
                cursor: pointer;
            }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Сайдбар со списком пользователей -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Bro Messenger</h2>
                <p id="myNameDisplay"></p>
            </div>
            <div class="users-list" id="usersList">
                <!-- Пользователи будут добавляться сюда через JS -->
            </div>
        </div>

        <!-- Основная область чата -->
        <div class="chat-area">
            <div class="top">
                <div class="chat-header" id="chatHeader">Выбери собеседника</div>
            </div>

            <div class="messages" id="messages"></div>

            <form class="form hidden" id="form">
                <input id="messageInput" placeholder="Напиши сообщение..." autocomplete="off" />
                <button>Отправить</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";
        let currentChat = null;

        const myNameDisplay = document.getElementById("myNameDisplay");
        const usersList = document.getElementById("usersList");
        const messages = document.getElementById("messages");
        const chatHeader = document.getElementById("chatHeader");
        const form = document.getElementById("form");
        const messageInput = document.getElementById("messageInput");

        // Логин при загрузке
        window.onload = () => {
            const name = prompt("Введи своё имя для входа:");
            if (!name || name.trim() === "") {
                alert("Имя обязательно!");
                window.location.reload();
                return;
            }

            myName = name.trim();
            myNameDisplay.textContent = `Ты: ${myName}`;

            socket.emit("join", myName);
            form.classList.remove("hidden");
        };

        // Обновление списка пользователей
        socket.on("users list", (users) => {
            usersList.innerHTML = "";

            users.forEach(user => {
                if (user === myName) return; // себя не показываем

                const div = document.createElement("div");
                div.className = `user-item ${user === currentChat ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="status"></div>
                    <span>${user}</span>
                `;

                div.onclick = () => openChatWith(user);
                usersList.appendChild(div);
            });
        });

        // Открытие чата с выбранным пользователем
        function openChatWith(username) {
            currentChat = username;
            chatHeader.textContent = `Чат с ${username}`;
            messages.innerHTML = `<p style="color:#888; text-align:center; margin-top:50px;">Начало переписки с ${username}</p>`;

            // Подсвечиваем активного
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.toggle("active", item.textContent.includes(username));
            });
        }

        // Отправка личного сообщения
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentChat) return;

            socket.emit("private message", {
                to: currentChat,
                text: text
            });

            // Показываем своё сообщение сразу
            addMessage(myName, text, true);
            messageInput.value = "";
        });

        // Получение личного сообщения
        socket.on("private message", (data) => {
            // Показываем сообщение, если чат с этим человеком открыт
            if (data.from === currentChat || data.from === myName) {
                const isMine = data.from === myName;
                addMessage(data.from, data.text, isMine);
            }
        });

        function addMessage(sender, text, isMine) {
            const div = document.createElement("div");
            div.className = `message ${isMine ? "me" : "other"}`;
            div.innerHTML = `
                <b>${escapeHTML(sender)}</b>
                ${escapeHTML(text)}
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHTML(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        // Для отладки
        socket.on("error", (msg) => {
            alert(msg);
        });
    </script>
</body>
</html>
